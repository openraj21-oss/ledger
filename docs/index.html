<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="theme-color" content="#FAFAF8">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<title>Ledger — goal tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{background:var(--paper);margin:0;padding:0 1rem;}
  :root{
    --paper:#FAFAF8; --ink:#161A20; --muted:#6B7076; --hair:#E4E2DC;
    --accent:#1F4B4B; --accent-light:#DCEAE8;
    --neglect:#B5482B; --neglect-light:#F5E2DB;
    --habit:#2F6B4F; --habit-light:#DCEBE1;
    --font-display:'Spectral',Georgia,serif; --font-body:'Inter',system-ui,sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{font-family:var(--font-body);color:var(--ink);}
  .wrap{max-width:720px;margin:0 auto;padding:1.5rem 0 3rem;}
  h1{font-family:var(--font-display);font-weight:600;font-size:26px;margin:0 0 2px;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 1.75rem;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--hair);margin-bottom:1.5rem;}
  .tab{font-family:var(--font-body);font-size:13px;color:var(--muted);background:none;border:none;padding:8px 4px;margin-right:20px;cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:500;}
  .panel{display:none;} .panel.active{display:block;}
  .addrow{display:flex;gap:8px;margin-bottom:1.5rem;}
  input[type=text],select{font-family:var(--font-body);font-size:14px;padding:9px 12px;border:1px solid var(--hair);border-radius:6px;background:var(--paper);color:var(--ink);}
  input[type=text]{flex:1;}
  button.primary{font-family:var(--font-body);font-size:13px;font-weight:500;padding:9px 16px;border-radius:6px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;}
  button.primary:hover{opacity:0.85;}
  button.ghost{font-family:var(--font-body);font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid var(--hair);background:none;color:var(--ink);cursor:pointer;}
  button.ghost:hover{border-color:var(--ink);}
  .goal{display:flex;align-items:center;gap:10px;padding:14px 0;border-bottom:1px solid var(--hair);}
  .stripe{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;}
  .gname{font-weight:500;font-size:15px;margin:0 0 3px;}
  .gmeta{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .gmeta .neg{color:var(--neglect);}
  .gbody{flex:1;min-width:0;cursor:pointer;}
  .progress{height:4px;background:var(--hair);border-radius:2px;margin-top:6px;overflow:hidden;width:140px;}
  .progress > div{height:100%;background:var(--accent);}
  .empty{color:var(--muted);font-size:13px;padding:2rem 0;text-align:center;}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem;}
  .stat{background:var(--accent-light);border-radius:10px;padding:14px;}
  .stat .n{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--accent);}
  .stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
  .chartblock{margin-bottom:2rem;}
  .charttitle{font-size:13px;font-weight:500;margin-bottom:10px;}
  .habitrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hair);gap:10px;}
  .habitname{font-weight:500;font-size:14px;cursor:pointer;}
  .habitmeta{font-family:var(--font-mono);font-size:11px;color:var(--habit);}
  .settingsrow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--hair);}
  .settingsrow label{font-size:13px;}
  .settingsrow input[type=number]{width:70px;font-family:var(--font-mono);}
  .iconbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--hair);background:none;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
  .iconbtn:hover{border-color:var(--ink);color:var(--ink);}
  .stepper{display:flex;align-items:center;gap:6px;}
  .stepper .count{font-family:var(--font-mono);font-size:13px;min-width:18px;text-align:center;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(0,0,0,0.2);opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;z-index:100;max-width:90vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .toast button{background:none;border:none;color:#9FD8C7;font-weight:500;font-size:13px;cursor:pointer;text-decoration:underline;padding:0;flex-shrink:0;}
  .detailtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .detailactions{display:flex;align-items:center;gap:6px;}
  .detailname{font-family:var(--font-display);font-weight:600;font-size:20px;margin:10px 0 2px;letter-spacing:-0.01em;}
  .mosaic{display:flex;flex-wrap:wrap;gap:4px;max-width:294px;margin-top:2px;}
  .mosaic .cell{width:28px;height:28px;border-radius:4px;background:var(--hair);}
  .mosaic .cell.filled{background:var(--accent);}
  .journalrow{padding:10px 0;border-bottom:1px solid var(--hair);}
  .journalts{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .journalnote{font-size:13px;margin-top:3px;}
  .calmonths{display:flex;gap:3px;margin-bottom:4px;margin-left:26px;}
  .calmonths span{width:12px;font-family:var(--font-mono);font-size:9px;color:var(--muted);overflow:visible;white-space:nowrap;}
  .calwrap{overflow-x:auto;padding-bottom:2px;display:flex;gap:6px;}
  .caldays{display:flex;flex-direction:column;gap:3px;flex-shrink:0;width:20px;}
  .caldays span{height:12px;line-height:12px;font-family:var(--font-mono);font-size:9px;color:var(--muted);}
  .calgrid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);grid-auto-columns:12px;gap:3px;width:max-content;}
  .calcell{width:12px;height:12px;border-radius:3px;background:var(--hair);cursor:pointer;}
  .calcell[data-level="1"]{background:#A9D2C8;}
  .calcell[data-level="2"]{background:#5B9689;}
  .calcell[data-level="3"]{background:var(--accent);}
  .caltooltip{position:fixed;display:none;background:var(--ink);color:var(--paper);padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.45;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:200;max-width:220px;pointer-events:none;opacity:0;transition:opacity .1s ease;}
  .caltooltip.show{opacity:1;}
  .caltooltip-date{font-family:var(--font-mono);font-size:11px;color:#9FD8C7;margin-bottom:3px;}
  .caltooltip-total{font-weight:500;}
  .caltooltip-breakdown{margin-top:4px;color:#D8D5CC;}
  .caltooltip-notes{margin-top:4px;font-style:italic;color:#D8D5CC;}
  .caltooltip-empty{color:#9AA0A6;}
</style>
</head>
<body>

<div id="authScreen" style="max-width:340px;margin:4rem auto;text-align:center;padding:0 1rem;">
  <h1 style="margin-bottom:8px;">Ledger</h1>
  <p class="sub">Sign in to sync your goals across devices.</p>
  <div id="gsiButtonContainer" style="display:flex;justify-content:center;margin-top:8px;"></div>
  <p id="authError" style="color:var(--neglect);font-size:12px;margin-top:12px;"></p>
</div>

<div class="wrap" id="appRoot" style="display:none;">
  <h1>Ledger</h1>
  <p class="sub">Goals ordered by neglect. Log a rep, watch it graduate.</p>

  <div class="tabs" id="mainTabs">
    <button class="tab active" data-tab="active">Active</button>
    <button class="tab" data-tab="habits">Habits</button>
    <button class="tab" data-tab="analytics">Analytics</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div class="panel active" id="panel-active">
    <div class="addrow">
      <input type="text" id="newGoalInput" placeholder="Add a goal…" />
      <button class="primary" id="addGoalBtn">Add</button>
    </div>
    <div id="activeList"></div>
  </div>

  <div class="panel" id="panel-habits">
    <div id="habitsList"></div>
  </div>

  <div class="panel" id="panel-analytics">
    <div class="statgrid" id="statGrid"></div>
    <div class="chartblock">
      <div class="charttitle">Activity</div>
      <div id="overallCalendar"></div>
    </div>
    <div class="chartblock">
      <div class="charttitle">Reps per goal</div>
      <div style="position:relative;height:220px;"><canvas id="repsChart" role="img" aria-label="Bar chart of reps logged per active goal"></canvas></div>
    </div>
    <div class="chartblock">
      <div class="charttitle">Time of day you log reps</div>
      <div style="position:relative;height:200px;"><canvas id="hourChart" role="img" aria-label="Bar chart of rep logs grouped by hour of day"></canvas></div>
    </div>
    <div class="chartblock">
      <div class="charttitle">Cumulative habits formed</div>
      <div style="position:relative;height:200px;"><canvas id="habitsChart" role="img" aria-label="Step line chart of cumulative habits graduated over time"></canvas></div>
    </div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="settingsrow">
      <label>Reps needed to graduate a goal into a habit</label>
      <input type="number" id="thresholdInput" min="1" max="200" />
    </div>
    <div class="settingsrow">
      <label>Reset all data</label>
      <button class="ghost" id="resetBtn">Reset</button>
    </div>
    <div class="settingsrow">
      <label id="signedInAs">Signed in</label>
      <button class="ghost" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <div class="panel" id="panel-detail">
    <div class="detailtop">
      <button class="ghost" id="backBtn">← Back</button>
      <div class="detailactions">
        <button class="iconbtn" id="detailRenameBtn" title="Rename">✎</button>
        <button class="iconbtn" id="detailDeleteBtn" title="Delete">✕</button>
      </div>
    </div>
    <p class="detailname" id="detailName"></p>
    <p class="gmeta" id="detailMeta"></p>

    <div class="statgrid" id="detailStats" style="margin-top:1.25rem;"></div>

    <div class="chartblock">
      <div class="charttitle">Progress toward graduation</div>
      <div class="mosaic" id="detailMosaic"></div>
    </div>

    <div class="chartblock">
      <div class="charttitle">Activity</div>
      <div id="detailCalendar"></div>
    </div>

    <div class="addrow">
      <input type="text" id="detailNoteInput" placeholder="Note for this rep (optional)…" />
      <button class="primary" id="detailLogBtn">Log rep</button>
    </div>

    <div class="chartblock">
      <div class="charttitle">Journal</div>
      <div id="detailJournal"></div>
    </div>
  </div>
</div>

<div class="toast" id="undoToast">
  <span id="undoToastMsg"></span>
  <button id="undoToastBtn">Undo</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://accounts.google.com/gsi/client?onload=initGoogleSignIn" async defer></script>
<script>
// ---- PASTE YOUR FIREBASE CONFIG HERE ----
// Firebase console → Project settings → General → Your apps → SDK setup and configuration
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDtsWqKcucofjfmysTK-l2_Be-q4lYJfis",
  authDomain: "ledger-ddd4a.firebaseapp.com",
  projectId: "ledger-ddd4a",
  storageBucket: "ledger-ddd4a.firebasestorage.app",
  messagingSenderId: "548246807473",
  appId: "1:548246807473:web:3f9f8ca305f0d777cc5390"
};
// ------------------------------------------

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUid = null;

let state = { goals: [], threshold: 21 };
let charts = {};
let editing = new Set(); // goal ids currently showing the rep stepper / rename / delete controls
let undoTimer = null;
let currentDetailId = null;

async function load() {
  if (!currentUid) return;
  try {
    const doc = await db.collection('ledger').doc(currentUid).get();
    if (doc.exists) state = doc.data().state;
  } catch (e) { console.error('load failed', e); }
  render();
}
async function save() {
  if (!currentUid) return;
  try { await db.collection('ledger').doc(currentUid).set({ state }); }
  catch (e) { console.error('save failed', e); }
}

auth.onAuthStateChanged(user => {
  if (user) {
    currentUid = user.uid;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';
    document.getElementById('signedInAs').textContent = 'Signed in as ' + (user.email || user.displayName || 'you');
    load();
  } else {
    currentUid = null;
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('appRoot').style.display = 'none';
  }
});

// Google's gsi/client script is supposed to call this via its onload= query
// param once it's ready, but that callback doesn't reliably fire on every
// load. So this is also triggered from a DOMContentLoaded fallback below,
// and it polls until google.accounts.id actually exists instead of assuming
// the script is ready. There's also a short delay between initialize() and
// renderButton() — calling them back-to-back races Google's internal setup
// and fails silently (console warning: "Failed to render button before
// calling initialize()").
let gsiRendered = false;
function initGoogleSignIn(attempt) {
  attempt = attempt || 0;
  if (gsiRendered) return;
  if (!(window.google && google.accounts && google.accounts.id)) {
    if (attempt < 50) setTimeout(() => initGoogleSignIn(attempt + 1), 100);
    return;
  }
  google.accounts.id.initialize({
    client_id: '548246807473-1ic15ldelhaksi9ptn9v6c8l7tdk3d5i.apps.googleusercontent.com',
    callback: handleGoogleCredential
  });
  const container = document.getElementById('gsiButtonContainer');
  if (container) {
    setTimeout(() => {
      if (gsiRendered) return;
      gsiRendered = true;
      google.accounts.id.renderButton(container, { theme: 'filled_black', size: 'large', shape: 'rectangular', width: 300, text: 'continue_with' });
    }, 300);
  }
}
document.addEventListener('DOMContentLoaded', () => initGoogleSignIn());
function handleGoogleCredential(response) {
  const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
  auth.signInWithCredential(credential).catch(e => {
    document.getElementById('authError').textContent = e.message;
  });
}
document.getElementById('signOutBtn').onclick = () => auth.signOut();

function daysSince(ts) {
  if (!ts) return Infinity;
  return (Date.now() - ts) / 86400000;
}
function fmtNeglect(ts) {
  if (!ts) return 'never logged';
  const d = daysSince(ts);
  if (d < 1) return 'today';
  return Math.floor(d) + 'd ago';
}
// Individual log entries are either a bare timestamp (legacy / no note, and
// what the +/- stepper still writes) or { ts, note } once a note is
// attached from the detail page. These two helpers normalize either shape
// so the rest of the app never has to branch on it.
function logTs(log) { return typeof log === 'number' ? log : log.ts; }
function logNote(log) { return (log && typeof log === 'object' && log.note) ? log.note : ''; }
function lastLog(goal) {
  return goal.logs.length ? logTs(goal.logs[goal.logs.length - 1]) : null;
}

function addGoal(name) {
  if (!name.trim()) return;
  state.goals.push({ id: Date.now() + Math.random().toString(36).slice(2), name: name.trim(), createdAt: Date.now(), status: 'active', graduatedAt: null, logs: [] });
  save(); render();
}

function logRep(id, note) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  const ts = Date.now();
  g.logs.push(note ? { ts, note } : ts);
  let graduated = false;
  if (g.logs.length >= state.threshold && g.status === 'active') {
    g.status = 'habit'; g.graduatedAt = Date.now(); graduated = true;
  }
  save(); render();
  showUndoToast('Logged "' + g.name + '"', () => undoLastLog(id, ts, graduated));
}

// Undo: reverses the single most recent logRep() call, within the toast window.
function undoLastLog(id, ts, wasGraduated) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  let idx = -1;
  for (let i = g.logs.length - 1; i >= 0; i--) {
    if (logTs(g.logs[i]) === ts) { idx = i; break; }
  }
  if (idx !== -1) g.logs.splice(idx, 1);
  if (wasGraduated) { g.status = 'active'; g.graduatedAt = null; }
  save(); render();
}

function showUndoToast(message, onUndo) {
  clearTimeout(undoTimer);
  const toast = document.getElementById('undoToast');
  document.getElementById('undoToastMsg').textContent = message;
  const btn = document.getElementById('undoToastBtn');
  btn.onclick = () => { onUndo(); hideUndoToast(); };
  toast.classList.add('show');
  undoTimer = setTimeout(hideUndoToast, 5000);
}
function hideUndoToast() {
  document.getElementById('undoToast').classList.remove('show');
  clearTimeout(undoTimer);
}

// Edit mode: lets you correct old mistakes (wrong goal logged days ago, etc.)
// by stepping the rep count up or down directly on the card. Also now hosts
// the rename/delete controls, so there's one "edit this goal" affordance
// instead of a second row of icons.
function toggleEdit(id) {
  if (editing.has(id)) editing.delete(id); else editing.add(id);
  render();
}
function adjustRep(id, delta) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  if (delta > 0) {
    g.logs.push(Date.now());
    if (g.logs.length >= state.threshold && g.status === 'active') { g.status = 'habit'; g.graduatedAt = Date.now(); }
  } else {
    if (!g.logs.length) return;
    g.logs.pop();
    if (g.status === 'habit' && g.logs.length < state.threshold) { g.status = 'active'; g.graduatedAt = null; }
  }
  save(); render();
}
function renameGoal(id) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  const next = prompt('Rename goal', g.name);
  if (next === null) return;
  const trimmed = next.trim();
  if (!trimmed) return;
  g.name = trimmed;
  save(); render();
}
function deleteGoal(id) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`Delete "${g.name}"? This can't be undone.`)) return;
  state.goals = state.goals.filter(x => x.id !== id);
  editing.delete(id);
  save();
  if (currentDetailId === id) closeDetail();
  else render();
}

function render() {
  const active = state.goals.filter(g => g.status === 'active')
    .sort((a, b) => daysSince(lastLog(b)) - daysSince(lastLog(a)) || a.createdAt - b.createdAt);
  const habits = state.goals.filter(g => g.status === 'habit').sort((a, b) => b.graduatedAt - a.graduatedAt);

  const activeList = document.getElementById('activeList');
  activeList.innerHTML = active.length ? '' : '<div class="empty">No active goals yet. Add one above.</div>';
  const maxNeg = Math.max(1, ...active.map(g => Math.min(daysSince(lastLog(g)), 30)));
  active.forEach(g => {
    const d = daysSince(lastLog(g));
    const intensity = Math.min(1, (isFinite(d) ? d : 30) / maxNeg);
    const isEditing = editing.has(g.id);
    const row = document.createElement('div');
    row.className = 'goal';
    row.innerHTML = `
      <div class="stripe" style="background:var(--neglect);opacity:${(0.25 + intensity * 0.75).toFixed(2)}"></div>
      <div class="gbody" onclick="openDetail('${g.id}')">
        <p class="gname">${escapeHtml(g.name)}</p>
        <p class="gmeta"><span class="neg">${fmtNeglect(lastLog(g))}</span> · ${g.logs.length}/${state.threshold} reps</p>
        <div class="progress"><div style="width:${Math.min(100, g.logs.length / state.threshold * 100)}%"></div></div>
      </div>
      ${isEditing ? `
        <div class="stepper">
          <button class="iconbtn" title="Remove a rep" onclick="adjustRep('${g.id}',-1)">−</button>
          <span class="count">${g.logs.length}</span>
          <button class="iconbtn" title="Add a rep" onclick="adjustRep('${g.id}',1)">+</button>
        </div>
        <button class="ghost" onclick="renameGoal('${g.id}')">Rename</button>
        <button class="ghost" onclick="deleteGoal('${g.id}')">Delete</button>
        <button class="ghost" onclick="toggleEdit('${g.id}')">Done</button>
      ` : `
        <button class="iconbtn" title="Edit" onclick="toggleEdit('${g.id}')">✎</button>
        <button class="primary" onclick="logRep('${g.id}')">Log</button>
      `}
    `;
    activeList.appendChild(row);
  });

  const habitsList = document.getElementById('habitsList');
  habitsList.innerHTML = habits.length ? '' : '<div class="empty">No habits formed yet — they will appear here once a goal hits its rep threshold.</div>';
  habits.forEach(g => {
    const isEditing = editing.has(g.id);
    const row = document.createElement('div');
    row.className = 'habitrow';
    row.innerHTML = `
      <span class="habitname" onclick="openDetail('${g.id}')">${escapeHtml(g.name)}</span>
      ${isEditing ? `
        <div class="stepper">
          <button class="iconbtn" title="Remove a rep" onclick="adjustRep('${g.id}',-1)">−</button>
          <span class="count">${g.logs.length}</span>
          <button class="iconbtn" title="Add a rep" onclick="adjustRep('${g.id}',1)">+</button>
        </div>
        <button class="ghost" onclick="renameGoal('${g.id}')">Rename</button>
        <button class="ghost" onclick="deleteGoal('${g.id}')">Delete</button>
        <button class="ghost" onclick="toggleEdit('${g.id}')">Done</button>
      ` : `
        <span class="habitmeta">${g.logs.length} reps · graduated ${new Date(g.graduatedAt).toLocaleDateString()}</span>
        <button class="iconbtn" title="Edit" onclick="toggleEdit('${g.id}')">✎</button>
      `}
    `;
    habitsList.appendChild(row);
  });

  document.getElementById('thresholdInput').value = state.threshold;
  renderAnalytics();
  if (currentDetailId) renderDetail();
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderAnalytics() {
  const allLogs = state.goals.flatMap(g => g.logs).map(logTs);
  const habitsCount = state.goals.filter(g => g.status === 'habit').length;
  const activeCount = state.goals.filter(g => g.status === 'active').length;
  document.getElementById('statGrid').innerHTML = `
    <div class="stat"><div class="n">${activeCount}</div><div class="l">active goals</div></div>
    <div class="stat"><div class="n">${habitsCount}</div><div class="l">habits formed</div></div>
    <div class="stat"><div class="n">${allLogs.length}</div><div class="l">total reps logged</div></div>
  `;

  renderCalendarInto('overallCalendar', state.goals, 20);

  const activeGoals = state.goals.filter(g => g.status === 'active');
  const repsCtx = document.getElementById('repsChart');
  if (charts.reps) charts.reps.destroy();
  charts.reps = new Chart(repsCtx, {
    type: 'bar',
    data: { labels: activeGoals.map(g => g.name), datasets: [{ data: activeGoals.map(g => g.logs.length), backgroundColor: '#1F4B4B', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', maxRotation: 45 }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });

  const hourCounts = new Array(24).fill(0);
  allLogs.forEach(ts => hourCounts[new Date(ts).getHours()]++);
  const hourCtx = document.getElementById('hourChart');
  if (charts.hour) charts.hour.destroy();
  charts.hour = new Chart(hourCtx, {
    type: 'bar',
    data: { labels: hourCounts.map((_, h) => h + 'h'), datasets: [{ data: hourCounts, backgroundColor: '#B5482B', borderRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', autoSkip: false, maxRotation: 90, font: { size: 9 } }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });

  const graduations = state.goals.filter(g => g.graduatedAt).map(g => g.graduatedAt).sort((a, b) => a - b);
  let cum = 0;
  const habitPoints = graduations.map(ts => ({ x: new Date(ts).toLocaleDateString(), y: ++cum }));
  const habitsCtx = document.getElementById('habitsChart');
  if (charts.habits) charts.habits.destroy();
  charts.habits = new Chart(habitsCtx, {
    type: 'line',
    data: { labels: habitPoints.map(p => p.x), datasets: [{ data: habitPoints.map(p => p.y), borderColor: '#2F6B4F', backgroundColor: '#2F6B4F', stepped: true, borderWidth: 2, pointRadius: 3, tension: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', maxTicksLimit: 6 }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });
}

// ---- Calendar heatmap (GitHub-contributions style), reused for the
// overall Analytics view and each goal's detail page. Native `title`
// tooltips were too slow/plain to read, so cells get a custom tooltip
// instead, driven by a per-container day index and shown on hover (desktop)
// or tap (mobile, via click + tap-elsewhere-to-dismiss).
let calendarIndexes = {};
let calTooltipEl = null;

function buildCalendarIndex(goalsForCal) {
  const index = {};
  goalsForCal.forEach(g => {
    g.logs.forEach(l => {
      const key = new Date(logTs(l)).toDateString();
      if (!index[key]) index[key] = { total: 0, byGoal: {}, notes: [] };
      index[key].total++;
      index[key].byGoal[g.name] = (index[key].byGoal[g.name] || 0) + 1;
      const note = logNote(l);
      if (note) index[key].notes.push(note);
    });
  });
  return index;
}

function renderCalendarInto(containerId, goalsForCal, weeks) {
  weeks = weeks || 20;
  const container = document.getElementById(containerId);
  if (!container) return;

  const index = buildCalendarIndex(goalsForCal);
  calendarIndexes[containerId] = index;

  container.innerHTML = '';
  if (!goalsForCal.some(g => g.logs.length)) { container.innerHTML = '<div class="empty">No activity yet.</div>'; return; }

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const gridEnd = new Date(today); gridEnd.setDate(today.getDate() + (6 - today.getDay()));
  const totalDays = weeks * 7;
  const gridStart = new Date(gridEnd); gridStart.setDate(gridEnd.getDate() - totalDays + 1);
  const maxCount = Math.max(1, ...Object.values(index).map(v => v.total));

  const monthsRow = document.createElement('div');
  monthsRow.className = 'calmonths';
  let lastMonth = null;
  for (let w = 0; w < weeks; w++) {
    const weekStart = new Date(gridStart); weekStart.setDate(gridStart.getDate() + w * 7);
    const label = document.createElement('span');
    if (weekStart.getMonth() !== lastMonth) {
      label.textContent = weekStart.toLocaleDateString(undefined, { month: 'short' });
      lastMonth = weekStart.getMonth();
    }
    monthsRow.appendChild(label);
  }

  // gridStart always lands on a Sunday (totalDays is a multiple of 7), so
  // row 0 = Sun, 1 = Mon, ... 6 = Sat — matches GitHub's day-label convention.
  const dayLabels = document.createElement('div');
  dayLabels.className = 'caldays';
  ['', 'Mon', '', 'Wed', '', 'Fri', ''].forEach(txt => {
    const s = document.createElement('span');
    s.textContent = txt;
    dayLabels.appendChild(s);
  });

  const grid = document.createElement('div');
  grid.className = 'calgrid';
  for (let d = 0; d < totalDays; d++) {
    const day = new Date(gridStart); day.setDate(gridStart.getDate() + d);
    const isFuture = day > today;
    const info = index[day.toDateString()];
    const c = isFuture ? 0 : (info ? info.total : 0);
    const cell = document.createElement('div');
    cell.className = 'calcell';
    cell.dataset.level = c === 0 ? 0 : (c >= maxCount ? 3 : (c > maxCount / 2 ? 2 : 1));
    if (!isFuture) cell.dataset.date = day.toDateString();
    grid.appendChild(cell);
  }

  const wrap = document.createElement('div');
  wrap.className = 'calwrap';
  wrap.appendChild(dayLabels);
  wrap.appendChild(grid);
  container.appendChild(monthsRow);
  container.appendChild(wrap);

  if (!container.dataset.calBound) {
    container.addEventListener('mouseover', handleCalHover);
    container.addEventListener('mouseout', handleCalOut);
    container.addEventListener('click', handleCalClick);
    container.dataset.calBound = '1';
  }
}

function ensureCalTooltip() {
  if (!calTooltipEl) {
    calTooltipEl = document.createElement('div');
    calTooltipEl.className = 'caltooltip';
    document.body.appendChild(calTooltipEl);
  }
  return calTooltipEl;
}
function showCalTooltip(cell) {
  const containerId = cell.closest('[id]').id;
  const info = (calendarIndexes[containerId] || {})[cell.dataset.date];
  const dateObj = new Date(cell.dataset.date);
  const tip = ensureCalTooltip();
  const parts = [`<div class="caltooltip-date">${dateObj.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })}</div>`];
  if (!info || !info.total) {
    parts.push('<div class="caltooltip-empty">No reps logged</div>');
  } else {
    parts.push(`<div class="caltooltip-total">${info.total} rep${info.total > 1 ? 's' : ''}</div>`);
    const goalNames = Object.keys(info.byGoal);
    if (goalNames.length > 1) {
      parts.push('<div class="caltooltip-breakdown">' + goalNames.map(n => `${escapeHtml(n)}: ${info.byGoal[n]}`).join('<br>') + '</div>');
    }
    if (info.notes.length) {
      parts.push('<div class="caltooltip-notes">' + info.notes.map(n => '"' + escapeHtml(n) + '"').join('<br>') + '</div>');
    }
  }
  tip.innerHTML = parts.join('');
  tip.style.display = 'block';
  const r = cell.getBoundingClientRect();
  const tipRect = tip.getBoundingClientRect();
  let left = r.left + r.width / 2 - tipRect.width / 2;
  left = Math.max(8, Math.min(left, window.innerWidth - tipRect.width - 8));
  let top = r.top - tipRect.height - 8;
  if (top < 8) top = r.bottom + 8;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  tip.classList.add('show');
}
function hideCalTooltip() {
  if (calTooltipEl) calTooltipEl.classList.remove('show');
}
function handleCalHover(e) {
  const cell = e.target.closest('.calcell');
  if (cell && cell.dataset.date) showCalTooltip(cell);
}
function handleCalOut(e) {
  if (e.target.closest('.calcell')) hideCalTooltip();
}
function handleCalClick(e) {
  const cell = e.target.closest('.calcell');
  if (!cell || !cell.dataset.date) return;
  e.stopPropagation();
  showCalTooltip(cell);
}
document.addEventListener('click', hideCalTooltip);

// ---- Per-goal detail page ----
function currentStreak(g) {
  const days = new Set(g.logs.map(l => new Date(logTs(l)).toDateString()));
  let streak = 0;
  const cursor = new Date();
  if (!days.has(cursor.toDateString())) cursor.setDate(cursor.getDate() - 1);
  while (days.has(cursor.toDateString())) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
}

function openDetail(id) {
  currentDetailId = id;
  document.getElementById('mainTabs').style.display = 'none';
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-detail').classList.add('active');
  renderDetail();
}
function closeDetail() {
  currentDetailId = null;
  document.getElementById('mainTabs').style.display = 'flex';
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector('.tab[data-tab="active"]').classList.add('active');
  document.getElementById('panel-active').classList.add('active');
  render();
}
document.getElementById('backBtn').onclick = closeDetail;
document.getElementById('detailRenameBtn').onclick = () => { if (currentDetailId) renameGoal(currentDetailId); };
document.getElementById('detailDeleteBtn').onclick = () => { if (currentDetailId) deleteGoal(currentDetailId); };

function renderDetail() {
  const g = state.goals.find(x => x.id === currentDetailId);
  if (!g) { closeDetail(); return; }

  document.getElementById('detailName').textContent = g.name;
  document.getElementById('detailMeta').innerHTML =
    `<span class="${g.status === 'habit' ? '' : 'neg'}">${fmtNeglect(lastLog(g))}</span> · ${g.logs.length}/${state.threshold} reps` +
    (g.status === 'habit' ? ` · graduated ${new Date(g.graduatedAt).toLocaleDateString()}` : '');

  document.getElementById('detailStats').innerHTML = `
    <div class="stat"><div class="n">${g.logs.length}</div><div class="l">total reps</div></div>
    <div class="stat"><div class="n">${currentStreak(g)}</div><div class="l">day streak</div></div>
    <div class="stat"><div class="n">${Math.max(0, state.threshold - g.logs.length)}</div><div class="l">reps to go</div></div>
  `;

  const mosaic = document.getElementById('detailMosaic');
  mosaic.innerHTML = '';
  const total = Math.max(state.threshold, g.logs.length);
  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i < g.logs.length ? ' filled' : '');
    mosaic.appendChild(cell);
  }

  renderCalendarInto('detailCalendar', [g], 20);

  const journal = document.getElementById('detailJournal');
  journal.innerHTML = g.logs.length ? '' : '<div class="empty">No reps logged yet.</div>';
  [...g.logs].reverse().forEach(log => {
    const note = logNote(log);
    const row = document.createElement('div');
    row.className = 'journalrow';
    row.innerHTML = `<div class="journalts">${new Date(logTs(log)).toLocaleString()}</div>${note ? `<div class="journalnote">${escapeHtml(note)}</div>` : ''}`;
    journal.appendChild(row);
  });

  const logBtn = document.getElementById('detailLogBtn');
  logBtn.disabled = g.status === 'habit';
  logBtn.textContent = g.status === 'habit' ? 'Graduated' : 'Log rep';
}

document.getElementById('detailLogBtn').onclick = () => {
  if (!currentDetailId || document.getElementById('detailLogBtn').disabled) return;
  const noteInput = document.getElementById('detailNoteInput');
  logRep(currentDetailId, noteInput.value.trim());
  noteInput.value = '';
};

document.getElementById('addGoalBtn').onclick = () => {
  const input = document.getElementById('newGoalInput');
  addGoal(input.value); input.value = '';
};
document.getElementById('newGoalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addGoal(e.target.value); e.target.value = ''; }
});
document.getElementById('thresholdInput').addEventListener('change', e => {
  state.threshold = Math.max(1, parseInt(e.target.value) || 21); save(); render();
});
document.getElementById('resetBtn').onclick = () => {
  if (confirm('This clears all goals and logs. Continue?')) { state = { goals: [], threshold: 21 }; save(); render(); }
};
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    currentDetailId = null;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  };
});

</script>
