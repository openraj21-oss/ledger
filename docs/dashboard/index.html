<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Financial Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <h1>Ledger — Dashboard</h1>
    <p class="sub">Sign in to view and edit balances.</p>
    <div id="gsiButtonContainer" class="gsi-container"></div>
    <p id="authError" class="auth-error"></p>
  </div>

  <div class="wrap" id="appRoot" style="display:none;">
    <header class="topbar">
      <h1>Net Worth</h1>
      <div class="asof" id="asOf">—</div>
    </header>

    <section class="hero">
      <div class="hero-number" id="netWorthTotal">€0</div>
      <div class="hero-sub" id="netWorthDelta"></div>
    </section>

    <section class="accounts" id="accountGrid">
      <!-- account cards injected by app.js -->
    </section>

    <section class="breakdown">
      <h2>By direction</h2>
      <div class="bars" id="directionBars"></div>
    </section>

    <section class="edit-panel">
      <h2>Manual balances</h2>
      <div class="edit-row">
        <label for="editTradeRepublic">Trade Republic (€)</label>
        <input type="number" id="editTradeRepublic" step="0.01">
      </div>
      <div class="edit-row">
        <label for="editBuffer">Buffer / Vault (€, leave blank if not opened)</label>
        <input type="number" id="editBuffer" step="0.01">
      </div>
      <button class="primary" id="saveBalancesBtn">Save</button>
      <span class="edit-status" id="editStatus"></span>
    </section>

    <footer class="status-footer">
      <span id="dataSourceNote">Showing sample data — no live bank connection yet.</span>
      <div class="signed-in-row">
        <span id="signedInAs"></span>
        <button class="ghost" id="signOutBtn">Sign out</button>
      </div>
    </footer>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client?onload=initGoogleSignIn" async defer></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
