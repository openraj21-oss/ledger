<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="theme-color" content="#FAFAF8">
<title>Ledger — goal tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body{background:var(--paper);margin:0;padding:0 1rem;}
  :root{
    --paper:#FAFAF8; --ink:#161A20; --muted:#6B7076; --hair:#E4E2DC;
    --accent:#1F4B4B; --accent-light:#DCEAE8;
    --neglect:#B5482B; --neglect-light:#F5E2DB;
    --habit:#2F6B4F; --habit-light:#DCEBE1;
    --font-display:'Spectral',Georgia,serif; --font-body:'Inter',system-ui,sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{font-family:var(--font-body);color:var(--ink);}
  .wrap{max-width:720px;margin:0 auto;padding:1.5rem 0 3rem;}
  h1{font-family:var(--font-display);font-weight:600;font-size:26px;margin:0 0 2px;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 1.75rem;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--hair);margin-bottom:1.5rem;}
  .tab{font-family:var(--font-body);font-size:13px;color:var(--muted);background:none;border:none;padding:8px 4px;margin-right:20px;cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent);font-weight:500;}
  .panel{display:none;} .panel.active{display:block;}
  .addrow{display:flex;gap:8px;margin-bottom:1.5rem;}
  input[type=text],select{font-family:var(--font-body);font-size:14px;padding:9px 12px;border:1px solid var(--hair);border-radius:6px;background:var(--paper);color:var(--ink);}
  input[type=text]{flex:1;}
  button.primary{font-family:var(--font-body);font-size:13px;font-weight:500;padding:9px 16px;border-radius:6px;border:1px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;}
  button.primary:hover{opacity:0.85;}
  button.ghost{font-family:var(--font-body);font-size:12px;padding:6px 12px;border-radius:6px;border:1px solid var(--hair);background:none;color:var(--ink);cursor:pointer;}
  button.ghost:hover{border-color:var(--ink);}
  .goal{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--hair);}
  .stripe{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0;}
  .gname{font-weight:500;font-size:15px;margin:0 0 3px;}
  .gmeta{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
  .gmeta .neg{color:var(--neglect);}
  .gbody{flex:1;min-width:0;}
  .progress{height:4px;background:var(--hair);border-radius:2px;margin-top:6px;overflow:hidden;width:140px;}
  .progress > div{height:100%;background:var(--accent);}
  .empty{color:var(--muted);font-size:13px;padding:2rem 0;text-align:center;}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem;}
  .stat{background:var(--accent-light);border-radius:10px;padding:14px;}
  .stat .n{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--accent);}
  .stat .l{font-size:11px;color:var(--muted);margin-top:2px;}
  .chartblock{margin-bottom:2rem;}
  .charttitle{font-size:13px;font-weight:500;margin-bottom:10px;}
  .habitrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hair);}
  .habitname{font-weight:500;font-size:14px;}
  .habitmeta{font-family:var(--font-mono);font-size:11px;color:var(--habit);}
  .settingsrow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--hair);}
  .settingsrow label{font-size:13px;}
  .settingsrow input[type=number]{width:70px;font-family:var(--font-mono);}
</style>
</head>
<body>

<div id="authScreen" style="max-width:340px;margin:4rem auto;text-align:center;padding:0 1rem;">
  <h1 style="margin-bottom:8px;">Ledger</h1>
  <p class="sub">Sign in to sync your goals across devices.</p>
  <button class="primary" id="signInBtn" style="width:100%;padding:12px;">Continue with Google</button>
  <p id="authError" style="color:var(--neglect);font-size:12px;margin-top:12px;"></p>
</div>

<div class="wrap" id="appRoot" style="display:none;">
  <h1>Ledger</h1>
  <p class="sub">Goals ordered by neglect. Log a rep, watch it graduate.</p>

  <div class="tabs">
    <button class="tab active" data-tab="active">Active</button>
    <button class="tab" data-tab="habits">Habits</button>
    <button class="tab" data-tab="analytics">Analytics</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div class="panel active" id="panel-active">
    <div class="addrow">
      <input type="text" id="newGoalInput" placeholder="Add a goal…" />
      <button class="primary" id="addGoalBtn">Add</button>
    </div>
    <div id="activeList"></div>
  </div>

  <div class="panel" id="panel-habits">
    <div id="habitsList"></div>
  </div>

  <div class="panel" id="panel-analytics">
    <div class="statgrid" id="statGrid"></div>
    <div class="chartblock">
      <div class="charttitle">Reps per goal</div>
      <div style="position:relative;height:220px;"><canvas id="repsChart" role="img" aria-label="Bar chart of reps logged per active goal"></canvas></div>
    </div>
    <div class="chartblock">
      <div class="charttitle">Time of day you log reps</div>
      <div style="position:relative;height:200px;"><canvas id="hourChart" role="img" aria-label="Bar chart of rep logs grouped by hour of day"></canvas></div>
    </div>
    <div class="chartblock">
      <div class="charttitle">Cumulative habits formed</div>
      <div style="position:relative;height:200px;"><canvas id="habitsChart" role="img" aria-label="Step line chart of cumulative habits graduated over time"></canvas></div>
    </div>
  </div>

  <div class="panel" id="panel-settings">
    <div class="settingsrow">
      <label>Reps needed to graduate a goal into a habit</label>
      <input type="number" id="thresholdInput" min="1" max="200" />
    </div>
    <div class="settingsrow">
      <label>Reset all data</label>
      <button class="ghost" id="resetBtn">Reset</button>
    </div>
    <div class="settingsrow">
      <label id="signedInAs">Signed in</label>
      <button class="ghost" id="signOutBtn">Sign out</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ---- PASTE YOUR FIREBASE CONFIG HERE ----
// Firebase console → Project settings → General → Your apps → SDK setup and configuration
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDtsWqKcucofjfmysTK-l2_Be-q4lYJfis",
  authDomain: "ledger-ddd4a.firebaseapp.com",
  projectId: "ledger-ddd4a",
  storageBucket: "ledger-ddd4a.firebasestorage.app",
  messagingSenderId: "548246807473",
  appId: "1:548246807473:web:3f9f8ca305f0d777cc5390"
};
// ------------------------------------------

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
let currentUid = null;

let state = { goals: [], threshold: 21 };
let charts = {};

async function load() {
  if (!currentUid) return;
  try {
    const doc = await db.collection('ledger').doc(currentUid).get();
    if (doc.exists) state = doc.data().state;
  } catch (e) { console.error('load failed', e); }
  render();
}
async function save() {
  if (!currentUid) return;
  try { await db.collection('ledger').doc(currentUid).set({ state }); }
  catch (e) { console.error('save failed', e); }
}

auth.onAuthStateChanged(user => {
  if (user) {
    currentUid = user.uid;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';
    document.getElementById('signedInAs').textContent = 'Signed in as ' + (user.email || user.displayName || 'you');
    load();
  } else {
    currentUid = null;
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('appRoot').style.display = 'none';
  }
});

document.getElementById('signInBtn').onclick = () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => {
    document.getElementById('authError').textContent = e.message;
  });
};
document.getElementById('signOutBtn').onclick = () => auth.signOut();

function daysSince(ts) {
  if (!ts) return Infinity;
  return (Date.now() - ts) / 86400000;
}
function fmtNeglect(ts) {
  if (!ts) return 'never logged';
  const d = daysSince(ts);
  if (d < 1) return 'today';
  return Math.floor(d) + 'd ago';
}
function lastLog(goal) {
  return goal.logs.length ? goal.logs[goal.logs.length - 1] : null;
}

function addGoal(name) {
  if (!name.trim()) return;
  state.goals.push({ id: Date.now() + Math.random().toString(36).slice(2), name: name.trim(), createdAt: Date.now(), status: 'active', graduatedAt: null, logs: [] });
  save(); render();
}
function logRep(id) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  g.logs.push(Date.now());
  if (g.logs.length >= state.threshold && g.status === 'active') {
    g.status = 'habit'; g.graduatedAt = Date.now();
  }
  save(); render();
}

function render() {
  const active = state.goals.filter(g => g.status === 'active')
    .sort((a, b) => daysSince(lastLog(b)) - daysSince(lastLog(a)) || a.createdAt - b.createdAt);
  const habits = state.goals.filter(g => g.status === 'habit').sort((a, b) => b.graduatedAt - a.graduatedAt);

  const activeList = document.getElementById('activeList');
  activeList.innerHTML = active.length ? '' : '<div class="empty">No active goals yet. Add one above.</div>';
  const maxNeg = Math.max(1, ...active.map(g => Math.min(daysSince(lastLog(g)), 30)));
  active.forEach(g => {
    const d = daysSince(lastLog(g));
    const intensity = Math.min(1, (isFinite(d) ? d : 30) / maxNeg);
    const row = document.createElement('div');
    row.className = 'goal';
    row.innerHTML = `
      <div class="stripe" style="background:var(--neglect);opacity:${(0.25 + intensity * 0.75).toFixed(2)}"></div>
      <div class="gbody">
        <p class="gname">${escapeHtml(g.name)}</p>
        <p class="gmeta"><span class="neg">${fmtNeglect(lastLog(g))}</span> · ${g.logs.length}/${state.threshold} reps</p>
        <div class="progress"><div style="width:${Math.min(100, g.logs.length / state.threshold * 100)}%"></div></div>
      </div>
      <button class="primary" onclick="logRep('${g.id}')">Log</button>
    `;
    activeList.appendChild(row);
  });

  const habitsList = document.getElementById('habitsList');
  habitsList.innerHTML = habits.length ? '' : '<div class="empty">No habits formed yet — they will appear here once a goal hits its rep threshold.</div>';
  habits.forEach(g => {
    const row = document.createElement('div');
    row.className = 'habitrow';
    row.innerHTML = `<span class="habitname">${escapeHtml(g.name)}</span><span class="habitmeta">${g.logs.length} reps · graduated ${new Date(g.graduatedAt).toLocaleDateString()}</span>`;
    habitsList.appendChild(row);
  });

  document.getElementById('thresholdInput').value = state.threshold;
  renderAnalytics();
}

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderAnalytics() {
  const allLogs = state.goals.flatMap(g => g.logs);
  const habitsCount = state.goals.filter(g => g.status === 'habit').length;
  const activeCount = state.goals.filter(g => g.status === 'active').length;
  document.getElementById('statGrid').innerHTML = `
    <div class="stat"><div class="n">${activeCount}</div><div class="l">active goals</div></div>
    <div class="stat"><div class="n">${habitsCount}</div><div class="l">habits formed</div></div>
    <div class="stat"><div class="n">${allLogs.length}</div><div class="l">total reps logged</div></div>
  `;

  const activeGoals = state.goals.filter(g => g.status === 'active');
  const repsCtx = document.getElementById('repsChart');
  if (charts.reps) charts.reps.destroy();
  charts.reps = new Chart(repsCtx, {
    type: 'bar',
    data: { labels: activeGoals.map(g => g.name), datasets: [{ data: activeGoals.map(g => g.logs.length), backgroundColor: '#1F4B4B', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', maxRotation: 45 }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });

  const hourCounts = new Array(24).fill(0);
  allLogs.forEach(ts => hourCounts[new Date(ts).getHours()]++);
  const hourCtx = document.getElementById('hourChart');
  if (charts.hour) charts.hour.destroy();
  charts.hour = new Chart(hourCtx, {
    type: 'bar',
    data: { labels: hourCounts.map((_, h) => h + 'h'), datasets: [{ data: hourCounts, backgroundColor: '#B5482B', borderRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', autoSkip: false, maxRotation: 90, font: { size: 9 } }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });

  const graduations = state.goals.filter(g => g.graduatedAt).map(g => g.graduatedAt).sort((a, b) => a - b);
  let cum = 0;
  const habitPoints = graduations.map(ts => ({ x: new Date(ts).toLocaleDateString(), y: ++cum }));
  const habitsCtx = document.getElementById('habitsChart');
  if (charts.habits) charts.habits.destroy();
  charts.habits = new Chart(habitsCtx, {
    type: 'line',
    data: { labels: habitPoints.map(p => p.x), datasets: [{ data: habitPoints.map(p => p.y), borderColor: '#2F6B4F', backgroundColor: '#2F6B4F', stepped: true, borderWidth: 2, pointRadius: 3, tension: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#6B7076', maxTicksLimit: 6 }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#6B7076', precision: 0 }, grid: { color: '#E4E2DC' } } } }
  });
}

document.getElementById('addGoalBtn').onclick = () => {
  const input = document.getElementById('newGoalInput');
  addGoal(input.value); input.value = '';
};
document.getElementById('newGoalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { addGoal(e.target.value); e.target.value = ''; }
});
document.getElementById('thresholdInput').addEventListener('change', e => {
  state.threshold = Math.max(1, parseInt(e.target.value) || 21); save(); render();
});
document.getElementById('resetBtn').onclick = () => {
  if (confirm('This clears all goals and logs. Continue?')) { state = { goals: [], threshold: 21 }; save(); render(); }
};
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  };
});

</script>
</body>
</html>
